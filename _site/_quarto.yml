project:
  type: website
  output-dir: ../docs

website:
  title: "tidyMacro"
  description: "High-Performance Vector Autoregression in R"
  favicon: logo.png

  navbar:
    background: "#33302E"
    foreground: "#FFF1E5"
    logo: logo.png
    logo-alt: "tidyMacro"
    logo-href: index.qmd
    title: false
    pinned: true
    collapse: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Replications"
        menu:
          - text: "Bloom (2009) — Uncertainty Shocks"
            href: Bloom2009.qmd
          - text: "Galí (1999) — Technology Shocks"
            href: Gali1999.qmd
          - text: "Beaudry & Portier (2014) — News Shocks"
            href: BeaudryPortier2014.qmd
          - text: "Kaenzig (2021) — Oil Supply News"
            href: Kaenzig2021.qmd
          - text: "Forni, Gambetti & Ricco (2022) — Non-Invertible Shocks"
            href: ForniGambettiRicco.qmd
    right:
      - icon: github
        href: https://github.com/muhsinciftci/tidyMacro
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/muhsin-ciftci/
        aria-label: LinkedIn

  page-footer:
    left: "Built with [Quarto](https://quarto.org)"
    center: "© 2025 Muhsin Ciftci · Goethe University Frankfurt"
    right: "[tidyMacro](index.qmd)"
    background: "#33302E"
    foreground: "#FFF1E5"

  page-navigation: true
  back-to-top-navigation: true

  open-graph:
    title: "tidyMacro"
    description: "High-Performance Vector Autoregression in R"

format:
  html:
    theme: [cosmo, styles.scss]
    toc: true
    toc-expand: true
    toc-location: left
    toc-depth: 3
    code-fold: false
    highlight-style: github
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto
  warning: false
  message: false
